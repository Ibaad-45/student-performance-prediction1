<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Performance Predictor{% endblock %}</title>
    <meta name="description" content="Predict student academic performance using machine learning. Enter study habits, attendance, and background to forecast final exam scores.">

    <!-- Google Fonts: Fraunces (display serif), Inter (body), JetBrains Mono (data/numeric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 40 40" width="30" height="30">
                        <circle cx="20" cy="20" r="18" fill="none" stroke="var(--brass)" stroke-width="2.5"/>
                        <line x1="20" y1="20" x2="28" y2="12" stroke="var(--brass)" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="20" cy="20" r="2.5" fill="var(--brass)"/>
                    </svg>
                </span>
                <span class="brand-text">EduMetrics<span class="brand-accent">.AI</span></span>
            </a>
            <nav class="site-nav" aria-label="Primary">
                <a href="{{ url_for('home') }}" class="{{ 'is-active' if request.path == '/' else '' }}">Predict</a>
                <a href="{{ url_for('dashboard') }}" class="{{ 'is-active' if request.path == '/dashboard' else '' }}">Dashboard</a>
                <a href="https://github.com" target="_blank" rel="noopener" class="nav-github">GitHub ↗</a>
            </nav>
        </header>

        <main class="site-main">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Built for academic demonstration &mdash; Student Performance Prediction System</p>
            <p class="footer-sub">Machine Learning &middot; Flask &middot; SQLite &middot; scikit-learn</p>
        </footer>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
